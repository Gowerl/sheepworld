name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Patch dynamicParams and Build
        run: |
          # ƒndert true zu false in der Datei, damit der statische Export auf GitHub klappt
          sed -i 's/dynamicParams = true/dynamicParams = false/g' "app/job/[id]/page.tsx"
          
          # Abh‰ngigkeiten installieren und Build starten
          npm ci && npm run build
          
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SHEEPWORLD_VIDEO_AI }}
          channelId: live
          projectId: sheepworld-video-ai